<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PSA Card Grader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading screen -->
  <div id="loading" class="screen">
    <div class="loader-content">
      <div class="pokeball-spinner"></div>
      <h2>PSA Card Grader</h2>
      <p id="load-msg">Starting camera...</p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" class="screen hidden">
    <!-- Camera layer -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Overlay canvas (guide + annotations) -->
    <canvas id="overlay"></canvas>

    <!-- Hidden analysis canvas -->
    <canvas id="capture" style="display:none"></canvas>

    <!-- Top bar -->
    <div id="topbar">
      <span id="fps">-- fps</span>
      <span id="status">Align card to frame</span>
    </div>

    <!-- Phase prompt -->
    <div id="phase-prompt" class="hidden"></div>

    <!-- Grade badge -->
    <div id="grade-badge" class="hidden">
      <div id="grade-number">--</div>
      <div id="grade-label">Analyzing...</div>
    </div>

    <!-- Sub-scores panel -->
    <div id="panel" class="collapsed">
      <div class="panel-row" id="panel-overall-row">
        <span class="label">Overall Grade</span>
        <span id="sc-overall">--</span>
      </div>
      <button id="panel-toggle"><span class="arrow">▲</span> Details</button>
      <div class="panel-row">
        <span class="label">🎯 Centering</span>
        <span id="sc-centering">--</span>
      </div>
      <div class="panel-row">
        <span class="label">📐 Corners</span>
        <span id="sc-corners">--</span>
      </div>
      <div class="panel-row">
        <span class="label">📏 Edges</span>
        <span id="sc-edges">--</span>
      </div>
      <div class="panel-row">
        <span class="label">✨ Surface</span>
        <span id="sc-surface">--</span>
      </div>
      <div class="panel-row psa10-row">
        <span class="label">PSA 10 Requirements</span>
      </div>
      <div id="psa10-checklist">
        <div class="check-item" id="chk-centering">⬜ Centering ≤ 55/45</div>
        <div class="check-item" id="chk-corners">⬜ Corners 9+</div>
        <div class="check-item" id="chk-edges">⬜ Edges 9+</div>
        <div class="check-item" id="chk-surface">⬜ Surface 9+</div>
      </div>
    </div>

    <!-- Bottom buttons -->
    <div id="bottom-buttons">
      <button id="scan-btn">▶ Start Scan</button>
      <button id="capture-btn">📸 Capture</button>
    </div>
  </div>

  <!-- Detail modal -->
  <div id="modal" class="hidden">
    <div class="modal-content">
      <button id="modal-close">✕</button>
      <h2>Card Analysis</h2>
      <canvas id="modal-canvas"></canvas>
      <div id="modal-detail"></div>
      <button id="save-btn">💾 Save PNG</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
